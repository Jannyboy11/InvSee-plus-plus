  release_hangar:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download InvSee++ and addons
        uses: actions/download-artifact@v8
        with:
          path: plugins
          merge-multiple: true
      - name: Set download-source to Hangar
        run: |
          echo Hangar > download-source.txt
          zip plugins/InvSee++.jar download-source.txt
      - name: Download Hangar upload script
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            HangarVersionUploader.java
          sparse-checkout-cone-mode: false
      - name: Publish new version to Hangar
        env:
          HANGAR_TOKEN: ${{ secrets.HANGAR_TOKEN }}
        run: |
          curl -L https://repo1.maven.org/maven2/com/lihaoyi/mill-dist/1.1.5/mill-dist-1.1.5-mill.sh -o mill
          chmod +x mill
          ./mill HangerVersionUploader.java:run

